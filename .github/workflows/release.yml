name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Cadence ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --no-bundle

      - name: Package portable
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri\target\release\cadence.exe -DestinationPath "Cadence_${{ github.ref_name }}_x64_portable.zip"

      - name: Upload portable to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} Cadence_*.zip --clobber
