[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
]
all-features = false

[advisories]
ignore = [
    # quick-xml: bloqué par plist v1.9.0 qui impose ^0.39.2.
    # Supprimer quand plist publiera >=1.10.0 avec quick-xml >=0.41.0.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # Tauri utilise GTK3 (gtk-rs) qui n'est plus maintenu (gtk4-rs recommandé).
    # En attendant Tauri v3.
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0419",
    # proc-macro-error: dépendance transitive de glib/gtk.
    "RUSTSEC-2024-0370",
    # unic-*: dépendances transitives de tauri-utils via urlpattern.
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0100",
    "RUSTSEC-2025-0098",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
allow-workspace = true

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
